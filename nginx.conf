worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
	worker_connections 1024;
}

http {
	# Required for streaming large files (mods, installers) without
	# buffering them in RAM/disk first.
	proxy_buffering off;
	proxy_request_buffering off;
	proxy_http_version 1.1;

	# Keep-alive to origin; reduces TLS handshake overhead on repeat downloads.
	upstream hammergate_origin {
		server ironhammercore.nexuscloud.ru:443;
		keepalive 16;
	}

	# Free-tier Render writes access logs to disk — silence them to keep the
	# container log clean. Errors still go to stderr above.
	access_log off;

	# Long timeouts so big mod downloads on slow uplinks don't get cut.
	proxy_connect_timeout 30s;
	proxy_send_timeout    300s;
	proxy_read_timeout    300s;

	# Render provides $PORT; fall back to 8000 for local docker runs.
	server {
		listen 8000 default_server;

		client_max_body_size 50m;

		location / {
			# Reverse-proxy everything to the origin over HTTPS, using SNI.
			proxy_pass         https://hammergate_origin;
			proxy_ssl_server_name on;
			proxy_ssl_name     ironhammercore.nexuscloud.ru;
			proxy_set_header   Host ironhammercore.nexuscloud.ru;

			# Pass the real client IP under our custom header. Same convention
			# as the Vercel proxy (see api/[...path].ts) and the backend's
			# _get_real_ip lookup order. Plain X-Real-IP would get overwritten
			# by the nginx on the origin side — hence the custom name.
			proxy_set_header   X-Original-Client-IP $remote_addr;

			# Don't forward the upstream Host-ish headers that might confuse
			# the origin.
			proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
			proxy_set_header   X-Forwarded-Proto https;
		}
	}
}
